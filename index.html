<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f97316">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Floo">
  <meta name="description" content="Your reading queue">

  <title>Floo</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <header class="app-header">
    <h1>Floo</h1>
    <button id="logout-btn" class="header-btn" hidden aria-label="Log out">Log out</button>
  </header>

  <!-- Login screen -->
  <section id="login-screen" class="app-main" role="main" hidden>
    <div class="login-container">
      <h2 class="login-heading">Sign in to Floo</h2>
      <button type="button" id="google-signin-btn" class="btn-google-signin" aria-label="Sign in with Google">
        <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>
    </div>
  </section>

  <!-- Authenticated content -->
  <main id="app-content" class="app-main" role="main" hidden>
    <div class="list-toolbar">
      <div class="toolbar-left">
        <span id="user-email" class="user-email"></span>
        <span id="tab-count" class="tab-count" hidden></span>
      </div>
      <button id="refresh-btn" class="header-btn" aria-label="Refresh reading list">Refresh</button>
    </div>
    <div id="fetch-error" class="fetch-error" role="alert" hidden>
      <p>Could not load your reading list. Check your connection and try again.</p>
    </div>
    <div id="loading-indicator" class="loading" hidden>
      <p>Loading your reading list&hellip;</p>
    </div>
    <ul id="tabs-list" class="tabs-list" aria-label="Reading list"></ul>
    <div id="empty-state" class="empty-state" hidden>
      <p class="empty-state-icon" aria-hidden="true">&#128218;</p>
      <p class="empty-state-text">Nothing to read right now.</p>
      <p class="empty-state-subtext">Tabs you mark in Brave will appear here.</p>
    </div>
  </main>

  <footer class="app-footer">
    <p>Floo &mdash; your reading queue</p>
  </footer>
</body>
</html>
